<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EarthMates</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <div class="container">
      <h1 class="logo">EarthMates</h1>
      <div class="content">
        <p>Website Is Under Maintenance</p>
        <h1>We're <span>Launching</span> Soon!</h1>
        <div class="launch-time">
          <div>
            <p id="days">00</p>
            <span>Days</span>
          </div>
          <div>
            <p id="hours">00</p>
            <span>Hours</span>
          </div>
          <div>
            <p id="minutes">00</p>
            <span>Minutes</span>
          </div>
          <div>
            <p id="seconds">00</p>
            <span>Seconds</span>
          </div>
        </div>
        <div class="email-form">
          <input
            type="email"
            id="emailInput"
            placeholder="Enter your email address"
          />
          <button type="button" onclick="sendEmail()">
            <span>Get notified</span> <img src="./triangle.png" />
          </button>
        </div>
      </div>
      <!-- <img src="./rocket.png" class="rocket" /> -->
    </div>

    <script>
      var countDownDate = new Date("September 1, 2024 00:00:00").getTime();
      var x = setInterval(function () {
        var now = new Date().getTime();
        var distance = countDownDate - now;

        var days = Math.floor(distance / (1000 * 60 * 60 * 24));
        var hours = Math.floor(
          (distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)
        );
        var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        var seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("days").innerHTML = days;
        document.getElementById("hours").innerHTML = hours;
        document.getElementById("minutes").innerHTML = minutes;
        document.getElementById("seconds").innerHTML = seconds;
      }, 1000);

      function sendEmail() {
        var emailInput = document.getElementById("emailInput");
        var emailAddress = emailInput.value;

        // Validate email format
        var emailRegex = /\S+@\S+\.\S+/;
        if (!emailRegex.test(emailAddress)) {
          alert("Please enter a valid email address.");
          return;
        }

        // Send email
        var emailContent = emailAddress + " has subscribed.";
        // Here you would place the code to actually send the email.
        // For demonstration purposes, we'll just log the email content.
        console.log("Email content:", emailContent);

        // Reset input field
        emailInput.value = "";
      }
    </script>
  </body>
</html>
